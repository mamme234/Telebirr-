<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Telebirr Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="images/logo.png" alt="Telebirr" class="sidebar-logo" onerror="this.style.display='none'">
                <h3>Telebirr Pro</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="bonus.html">
                    <i class="fas fa-gift"></i>
                    <span>Bonuses</span>
                </a>
                <a href="profile.html" class="active">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
                <a href="login.php?logout=1">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button class="menu-toggle" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>👤 Profile</h1>
                </div>
                <div class="header-right">
                    <div class="balance-badge">
                        <i class="fas fa-wallet"></i>
                        <span id="userBalance">ETB 1,250.00</span>
                    </div>
                </div>
            </header>

            <div class="profile-container">
                <div class="profile-card">
                    <div class="profile-avatar">
                        <i class="fas fa-user-circle"></i>
                        <h2 id="profileName">User Name</h2>
                        <p id="profilePhone">09xxxxxxxx</p>
                    </div>
                    
                    <form id="profileForm" onsubmit="return updateProfile()">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Full Name</label>
                            <input type="text" id="profileFullName" name="name" required>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Phone Number</label>
                            <input type="text" id="profilePhoneNumber" disabled>
                            <small>Phone number cannot be changed</small>
                        </div>

                        <hr>

                        <h3>Change PIN</h3>
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Current PIN</label>
                            <div class="pin-input-group">
                                <input type="password" id="currentPin" placeholder="Enter current PIN" maxlength="6" pattern="[0-9]{6}">
                                <button type="button" class="toggle-pin" onclick="togglePin('currentPin')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> New PIN</label>
                            <div class="pin-input-group">
                                <input type="password" id="newPin" placeholder="Enter new PIN" maxlength="6" pattern="[0-9]{6}">
                                <button type="button" class="toggle-pin" onclick="togglePin('newPin')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-check-circle"></i> Confirm New PIN</label>
                            <div class="pin-input-group">
                                <input type="password" id="confirmNewPin" placeholder="Confirm new PIN" maxlength="6" pattern="[0-9]{6}">
                                <button type="button" class="toggle-pin" onclick="togglePin('confirmNewPin')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn-primary">Update Profile</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
