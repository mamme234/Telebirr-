<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonuses - Telebirr Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="images/logo.png" alt="Telebirr" class="sidebar-logo" onerror="this.style.display='none'">
                <h3>Telebirr Pro</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="bonus.html" class="active">
                    <i class="fas fa-gift"></i>
                    <span>Bonuses</span>
                </a>
                <a href="profile.html">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
                <a href="login.php?logout=1">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button class="menu-toggle" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>🎁 Bonuses</h1>
                </div>
                <div class="header-right">
                    <div class="balance-badge">
                        <i class="fas fa-wallet"></i>
                        <span id="userBalance">ETB 1,250.00</span>
                    </div>
                </div>
            </header>

            <div class="bonuses-container">
                <div class="bonuses-grid" id="allBonuses">
                    <!-- Loaded from API -->
                </div>
            </div>
        </main>
    </div>

    <!-- Claim Modal -->
    <div class="modal" id="claimModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Claim Bonus</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to claim this bonus?</p>
                <div id="bonusDetails"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" id="confirmClaim">Claim Now</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
